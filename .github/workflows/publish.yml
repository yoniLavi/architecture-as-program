name: Build and publish proposal

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: typst-community/setup-typst@v4

      - uses: pandoc/actions/setup@v1

      - name: Build proposal
        run: make build

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp dist/proposal.pdf _site/
          cp dist/proposal.md _site/
          cp dist/proposal.html _site/
          cp dist/proposal.css _site/

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
